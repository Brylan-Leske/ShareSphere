<!DOCTYPE html>
<html lang="en">

<head>
    <title>Customizer</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Poppins">
    <style>
        body {
            background-color: #121212;


            display: flex;
            justify-content: center;
            align-content: center;
            flex-wrap: wrap;
            flex-direction: column;
        }

        .buttonLabel {
            font: 1rem 'Poppins', sans-serif;
            font-weight: bold;
            color: #ffffff;
            vertical-align: 50%;
        }

        h1 {
            font: 1rem 'Poppins', sans-serif;
            font-weight: bold;
            color: #ffffff;
            font-size: x-large;
        }

        p {
            color: #ffffff;
            font: 1rem 'Poppins', sans-serif;
            font-size: x-small;
        }

        .button {
            border-radius: 8px;
            padding: 4px 16px 4px 16px;
            margin-bottom: 10px;
            margin-top: 10px;

            background-color: #292b31;
            margin-left: auto;
            margin-right: auto;

            width: auto;

            position: relative;
        }

        .resetColor {
            border-radius: 8px;
            padding: 4px 16px 4px 16px;
            margin-bottom: 10px;
            margin-top: 10px;

            border-style: none;

            margin-left: auto;
            margin-right: 10px;
            margin-top: 0;

            width: auto;
            height: 50px;

            position: absolute;
            right: 0;


            top: 50%;
            -ms-transform: translateY(-50%);
            transform: translateY(-50%);

            font: 1rem 'Poppins', sans-serif;
            font-weight: bold;
            color: #ffffff;
            background-color: #121212;
        }

        .resetColor:hover {
            background-color: #292b31;
        }


        .button:hover {
            background-color: #373a41;
        }

        .pickerButton {
            background-color: transparent;
            border: none;
            width: 50px;
            height: 50px;

        }

        .pickerButton::-webkit-color-swatch {
            border-radius: 8px;
            background-color: #ffffff;
            border: none;
            width: 100%;
            height: 100%;
        }

        .jsonOutput {
            width: 100%;
            min-height: 150px;
            border-radius: 8px;
            padding: 4px 16px 4px 16px;
            background-color: #292b31;
            border: none;
            resize: none;

            color: #ffffff;
            font: 1rem 'Poppins', sans-serif;
            font-size: smaller;
            margin-left: auto;
            margin-right: auto;
        }

        .jsonOutput::-webkit-scrollbar-thumb {
            background: rgb(63, 63, 63);
            border-radius: 8px;
        }

        .copy {
            width: 100%;
            border-radius: 8px;
            padding: 4px 16px 4px 16px;
            background-color: #ffffff;

            cursor: pointer;

            font: 1rem 'Poppins', sans-serif;
            font-weight: bold;
            color: #000000;
            text-align: center;

            margin-left: auto;
            margin-right: auto;
            margin-top: 10px;
        }

        .jsonOutputTitle {
            width: 100%;
            text-align: center;
        }

        .jsonOutputArea {
            margin: 0 auto;
            width: 50%;
        }

        .copy:hover {
            background-color: #cacaca;
        }


        .flex-container {
            display: flex;
            flex-wrap: wrap;
            background-color: transparent;
        }

        .pickers {
            overflow-x: hidden;
            overflow-y: auto;
            width: 300px;
            height: calc(300px /0.562)
                /*width divided by aspect ratio*/
        }

        .pickers::-webkit-scrollbar-thumb {
            background: rgb(63, 63, 63);
            border-radius: 8px;
        }

        /* GUI elements */

        /* mock gui container */
        .mockGUI {
            border-radius: 20px;
            background-color: var(--background);
            margin: 10px 10px 10px 10px;
            width: 300px;
            height: calc(300px /0.562);
            /*width divided by aspect ratio*/
            position: relative;
        }

        .topbar {
            background-color: var(--background2);
            width: 100%;
            height: 30px;

            border-bottom: var(--border);
            border-bottom-width: 2px;
            border-bottom-style: solid;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;


        }

        .middle {
            background-color: var(--background);
            width: 100%;
            height: calc(100% - 60px)
        }

        .bottombar {
            background-color: var(--background2);
            width: 100%;
            height: 30px;
            position: absolute;
            bottom: 0;
            left: 0;

            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;

            border-top: var(--border);
            border-top-width: 2px;
            border-top-style: solid;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }

        .bottombarButton {
            cursor: no-drop;
            margin-left: 2%;
            margin-right: 2%;

            height: 100%;
            width: auto;
        }

        .createPostButton {
            width: 52.5px;
            /*17.5% of the width of the mockGUI div*/
            height: 52.5px;
            /*17.5% of the width of the mockGUI div*/

            border-radius: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: absolute;
            bottom: 34px;
            right: 2px;
            background-color: var(--accent);
            color: var(--text);
            font: 1rem 'Poppins', sans-serif;
            font-size: xx-large;

            cursor: no-drop;
        }

        .feedPage {
            background-color: transparent;
            width: 100%;
            height: 95%;

            position: relative;
            top: 5%;

            border-top-style: solid;
            border-top-width: 2px;
            border-top-color: var(--border);
        }

        /*what a post looks like*/
        .post {
            background-color: transparent;
            width: 100%;
            height: 64.6%;

            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .postProfile {
            width: 100%;
            height: auto;
            /* background-color: #ffffff; */
            display: flex;
            flex-direction: row;
            justify-content: left;
            align-items: center;
            color: #ffffff;
            cursor: no-drop;
        }

        .posterImage {
            background-color: var(--background2);
            height: calc(0.75*50px);
            width: calc(0.75*50px);
            border-radius: 50%;
        }

        .posterNickname {
            color: var(--text);
            font: 1rem 'Poppins', sans-serif;
            font-size: small;
            font-weight: bold;
            margin-left: 2%;
        }

        .posterUsername {
            color: var(--text2);
            font: 1rem 'Poppins', sans-serif;
            font-size: x-small;
            margin-left: 2%;
        }

        .postTime {
            color: var(--text2);
            font: 1rem 'Poppins', sans-serif;
            font-size: x-small;

            margin-left: 2%;
        }



        /* these colors change from user input */
        :root {
            /*these change based on user input*/
            --background: #22272d;
            --background2: #2c333b;
            --border: #424e5e;
            --text: #ffffff;
            --text2: #a7a7a7;
            --accent: #6fa9c7;

            /*these are the default values*/
            --backgroundDefault: #22272d;
            --background2Default: #2c333b;
            --borderDefault: #424e5e;
            --textDefault: #ffffff;
            --text2Default: #a7a7a7;
            --accentDefault: #6fa9c7;
        }
    </style>
</head>

<body>
    <!-- contains pickers and the mock gui -->
    <div class="flex-container">
        <div class="pickers">
            <div class="button">
                <input class="pickerButton" type="color" id="background" name="background" value="#22272d">
                <label class="buttonLabel" for="background">Background</label>
                <input class="resetColor" type="button" id="resetbackground" name="resetbackground" value="Reset">
            </div>

            <div class="button">
                <input class="pickerButton" type="color" id="background2" name="background2" value="#2c333b">
                <label class="buttonLabel" for="background2">Background 2</label>
                <input class="resetColor" type="button" id="resetbackground2" name="resetbackground2" value="Reset">
            </div>

            <div class="button">
                <input class="pickerButton" type="color" id="text" name="text" value="#ffffff">
                <label class="buttonLabel" for="text">Text</label>
                <input class="resetColor" type="button" id="resettext" name="resettext" value="Reset">
            </div>

            <div class="button">
                <input class="pickerButton" type="color" id="text2" name="text2" value="#a7a7a7">
                <label class="buttonLabel" for="text2">Text 2</label>
                <input class="resetColor" type="button" id="resettext2" name="resettext2" value="Reset">
            </div>

            <div class="button">
                <input class="pickerButton" type="color" id="border" name="border" value="#424e5e">
                <label class="buttonLabel" for="border">Border</label>
                <input class="resetColor" type="button" id="resetborder" name="resetborder" value="Reset">
            </div>

            <div class="button">
                <input class="pickerButton" type="color" id="accent" name="accent" value="#6fa9c7">
                <label class="buttonLabel" for="accent">Accent</label>
                <input class="resetColor" type="button" id="resetaccent" name="resetaccent" value="Reset">
            </div>


        </div>
        <div class="mockGUI">
            <div class="createPostButton">+</div>
            <div class="topbar"></div>
            <div class="middle">
                <div class="feedPage">
                    <div class="post">
                        <div class="postProfile">
                            <img class="posterImage"
                                src="https://github.com/Brylan-Leske/ShareSphere/blob/gh-pages/pageAssets/placeHolderUser.png?raw=true">
                            <div class="posterNickname">Nickname</div>
                            <div class="posterUsername">@Username</div>
                            <div class="postTime">• 5h</div>
                        </div>
                        <div class="postContent"></div>
                        <div class="postInteraction"></div>
                    </div>
                </div>
            </div>
            <div class="bottombar">
                <img class="bottombarButton" id="home"
                    src="https://github.com/Brylan-Leske/ShareSphere/blob/gh-pages/pageAssets/home.png?raw=true">
                <img class="bottombarButton" id="notifications"
                    src="https://github.com/Brylan-Leske/ShareSphere/blob/gh-pages/pageAssets/notifications.png?raw=true">
                <img class="bottombarButton" id="profile"
                    src="https://github.com/Brylan-Leske/ShareSphere/blob/gh-pages/pageAssets/profile.png?raw=true">
            </div>
        </div>
    </div>
    <div class="jsonOutputArea">
        <h1 class="jsonOutputTitle">JSON Output</h1>
        <textarea class="jsonOutput" id="jsonOutput" readonly></textarea>
        <div class="copy">Copy JSON</a></div>
    </div>
    <p>*more customization coming soon*</p>
    <script>
        var changes = {};
        const colorPickers = document.querySelectorAll(".pickerButton");
        const resetButtons = document.querySelectorAll(".resetColor");
        const jsonOutput = document.getElementById('jsonOutput');
        var r = document.querySelector(':root');


        resetButtons.forEach((button) => {
            button.addEventListener('click', (event) => {
                const color = r.style.getPropertyValue('--' + ((button.id).replace('reset', '')) + 'Default');
                changes[(button.id.replace('reset', ''))] = color;
                r.style.setProperty('--' + (button.id).replace('reset', ''), color);
                updateJsonOutput();
                fixColorSwatches();
            })
        })

        colorPickers.forEach((picker) => {
            picker.addEventListener('input', (event) => {
                const color = event.target.value;
                changes[picker.id] = color;
                r.style.setProperty('--' + picker.id, color);
                updateJsonOutput();
            });
        })

        function fixColorSwatches() {
            colorPickers.forEach((picker) => {
                const color = getComputedStyle(r).getPropertyValue('--' + picker.id);
                changes[picker.id] = color;
                picker.value = color;
                updateJsonOutput();
            });
        }

        function updateJsonOutput() {
            const json = JSON.stringify(changes);
            jsonOutput.innerHTML = json;
        }
    </script>
</body>


</html>
