<!DOCTYPE html>
<html>

<head>
  <title>My Documentation</title>
  <style>
    /* Overall layout */
    body {
      margin: 0;
      padding: 0;
      display: flex;
      background-color: #121212;
      color: #ffffff;
    }

    /* Sidebar style */
    .sidebar {
      width: 200px;
      background-color: #292b31;
      padding: 20px;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.6);
      /* Add drop shadow to the right side */
      z-index: 100;
      border-right: 2px solid #616368;
      /* Add border to the right side */

    }

    /* Sidebar link style */
    .sidebar a {
      font-size: 15px;
      display: block;
      margin-bottom: 10px;
      color: #ffffff;
      text-decoration: none;
    }

    /* Top bar style */
    .topbar {
      background-color: #4c4e53;
      padding: 10px;
      position: fixed;
      top: 0;
      left: 240px;
      width: calc(100% - 240px);
      z-index: 99;
      box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.6);
      border-bottom: 2px solid #616368;
      /* Add border to the bottom */
    }

    /* Top bar path style */
    .topbar-path {
      margin-bottom: 10px;
    }

    /* give Topbar Path Name pointer*/
    .topbarPathName {
      font-weight: bold;
      /* Set font weight to bold */
      color: #ffffff;
      cursor: pointer;
    }

    /* Content style */
    .content {
      margin-left: 240px;
      margin-top: 40px;
      padding: 20px;
      flex: 1;

    }

    /* Hide tab content by default */
    .tabcontent {
      display: none;
    }

    #search-container {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
    }

    #search-input {
      padding: 5px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
      margin-bottom: 10px;
      flex: 1;
      box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.6);
    }
  </style>
  <script>
    var pathObjects = 1;

    function openTab(tabName, pathName, fromSidebar) {
      var i, tabcontent;
      tabcontent = document.getElementsByClassName("tabcontent");

      // Hide all tab contents
      for (i = 0; i < tabcontent.length; i++) {
        tabcontent[i].style.display = "none";
      }

      // Fetch the tab content from the separate HTML file
      fetchTabContent(tabName, function (content) {
        // Display the fetched tab content
        document.getElementById(tabName).innerHTML = content;
        document.getElementById(tabName).style.display = "block";

        // Update the top bar path
        var topbarPath = document.getElementById("topbar-path");

        if (fromSidebar) {
          pathObjects = 1;
          topbarPath.innerHTML = '<span id=' + pathObjects + ' class="topbarPathName" onclick="useTopbarPath(\'' + tabName + '\',' + pathObjects + ')">' + pathName + '</span>';
        } else {
          pathObjects += 1;
          topbarPath.innerHTML += '<span id=' + pathObjects + ' class="topbarPathName" onclick="useTopbarPath(\'' + tabName + '\',' + pathObjects + ')"> > ' + pathName + '</span>';
        }
      });
    }

    function fetchTabContent(tabName, callback) {
      // Map tab names to file paths
      var tabFiles = {
        Home: "/tabs/home.html",
        Documentation: "/tabs/documentation.html",
        Customizer: "/tabs/customizer.html",
        Credit: "/tabs/credit.html",
        Installation: "/tabs/installation.html",
        // Add more tab names and file paths as needed
      };

      // Check if the tab name is valid
      if (tabFiles.hasOwnProperty(tabName)) {
        var filePath = tabFiles[tabName];

        // Fetch the tab content from the HTML file
        fetch(filePath)
          .then(function (response) {
            return response.text();
          })
          .then(function (content) {
            callback(content);
          })
          .catch(function (error) {
            console.log("Error fetching tab content:", error);
          });
      } else {
        console.log("Invalid tab name:", tabName);
      }
    }


    function useTopbarPath(tabName, pathNumber) {

      var i, tabcontent;
      tabcontent = document.getElementsByClassName("tabcontent");
      for (i = 0; i < tabcontent.length; i++) {
        tabcontent[i].style.display = "none";
      }
      document.getElementById(tabName).style.display = "block";

      // Update the top bar path
      var topbarPath = document.getElementById("topbar-path");

      const topbarPathNames = document.getElementsByClassName("topbarPathName");

      for (var i = 0; i < topbarPathNames.length; i++) {
        if (topbarPathNames[i].id > pathNumber) {
          topbarPathNames[i].remove();
        }
      }
    }

    function search() {
      var searchInput = document.getElementById("search-input").value.toLowerCase();
      var tabcontent = document.getElementsByClassName("tabcontent");
      var searchResultsContent = document.getElementById("search-results-content");
      var numResults = 0;
      searchResultsContent.innerHTML = "";

      for (var i = 0; i < tabcontent.length; i++) {
        var tab = tabcontent[i];
        var tabName = tab.id;

        // Skip the "SearchResults" tab
        if (tabName === "SearchResults") {
          continue;
        }

        var tabText = tab.innerText.toLowerCase();

        var index = tabText.indexOf(searchInput);
        if (index !== -1) {
          numResults++;
          var resultLink = document.createElement("a");
          resultLink.href = "#";
          resultLink.onclick = function (tabId) {
            return function () {
              openTab(tabId, tabId, false);
            };
          }(tabName);

          var beforeText = tabText.substring(Math.max(0, index - 20), index);
          var afterText = tabText.substring(index + searchInput.length, index + searchInput.length + 20);
          var contextText = beforeText + "<strong>" + tabText.substr(index, searchInput.length) + "</strong>" + afterText;

          resultLink.innerHTML = tabName + ": " + contextText;
          searchResultsContent.appendChild(resultLink);
          searchResultsContent.appendChild(document.createElement("br"));
        }
      }

      if (numResults === 0) {
        searchResultsContent.innerText = "No results found.";
      }

      openTab("SearchResults", "Search Results", true);
    }

    function handleSearch(event) {
      if (event.keyCode === 13) {
        search();
      }
    }

  </script>
</head>

<body>
  <!-- Top bar -->
  <div class="topbar">
    <div id="topbar-path" class="topbar-path">
      Path
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <!-- Add the search bar -->
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Search..." onkeydown="handleSearch(event)">
    </div>


    <a href="#" onclick="openTab('Home', 'Home',true)">Home</a>
    <a href="#" onclick="openTab('Documentation', 'Documentation',true)">Documentation</a>
    <a href="#" onclick="openTab('Customizer', 'Customizer',true)">Customizer</a>
    <a href="#" onclick="openTab('Credit', 'Credit',true)">Credit</a>
    <a href="#" onclick="openTab('Installation', 'Installation',true)">Installation</a>
  </div>

  <!-- Content -->
  <div class="content">
    <div id="tabContentContainer"></div>
  </div>


  <script>
    // Open the Home tab by default
    openTab('Home', 'Home', true)
  </script>
</body>

</html>
